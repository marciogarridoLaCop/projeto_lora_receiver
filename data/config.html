<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>ESP32 &middot; WiFi Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0891b2 100%);
      padding: 28px 20px 22px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
    header p  { font-size: .88rem; opacity: .82; margin-top: 7px; }

    .container { max-width: 460px; margin: 28px auto; padding: 0 16px 40px; }

    .card { background: #1e293b; border-radius: 16px; padding: 22px; border: 1px solid #334155; margin-bottom: 18px; }
    .card-title {
      font-size: .72rem; text-transform: uppercase; letter-spacing: 1.8px;
      color: #64748b; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .rescan { background: none; border: none; color: #0891b2; cursor: pointer; font-size: .8rem; padding: 0; letter-spacing: 0; }
    .rescan:hover { color: #38bdf8; }

    .net-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 13px; border-radius: 10px; cursor: pointer;
      transition: background .15s, border-color .15s;
      margin-bottom: 7px; border: 1px solid #1e293b; background: #0f172a;
    }
    .net-item:last-child { margin-bottom: 0; }
    .net-item:hover  { background: #0c1e33; border-color: rgba(8,145,178,.25); }
    .net-item.active { background: #082f49; border-color: #0891b2; }

    .net-name { font-weight: 500; font-size: .93rem; display: flex; align-items: center; gap: 6px; }
    .net-lock { font-size: .75rem; opacity: .7; }
    .net-meta { font-size: .74rem; color: #64748b; margin-top: 2px; }

    .signal { display: flex; gap: 3px; align-items: flex-end; margin-left: 12px; flex-shrink: 0; }
    .signal b { width: 4px; background: #1e3a5f; border-radius: 2px; display: block; }
    .signal b.on { background: #0891b2; }
    .signal b:nth-child(1) { height: 5px; }
    .signal b:nth-child(2) { height: 9px; }
    .signal b:nth-child(3) { height: 13px; }
    .signal b:nth-child(4) { height: 17px; }

    .msg { text-align: center; color: #475569; padding: 18px 0; font-size: .88rem; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #334155; border-top-color: #0891b2;
      border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .72rem; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.2px; }

    input[type=text],
    input[type=password] {
      width: 100%; background: #0f172a; border: 1.5px solid #334155;
      border-radius: 9px; padding: 12px 14px;
      color: #e2e8f0; font-size: .96rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #0891b2; box-shadow: 0 0 0 3px rgba(8,145,178,.12); }

    .pass-wrap { position: relative; }
    .eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #475569; cursor: pointer;
      padding: 4px 6px; font-size: .95rem; line-height: 1;
    }
    .eye:hover { color: #94a3b8; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #0891b2, #1d4ed8);
      border: none; border-radius: 10px; padding: 14px;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s;
      letter-spacing: .3px; margin-top: 4px;
    }
    .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .alert { border-radius: 9px; padding: 12px 14px; margin-top: 14px; font-size: .88rem; display: none; line-height: 1.5; }
    .alert.ok  { background: #042f1e; border: 1px solid #059669; color: #6ee7b7; }
    .alert.err { background: #2d0707; border: 1px solid #dc2626; color: #fca5a5; }

    footer { text-align: center; padding: 8px 0 24px; color: #334155; font-size: .75rem; }
  </style>
</head>
<body>
  <header>
    <h1>&#x1F4F6; ESP32 LoRa &mdash; WiFi Setup</h1>
    <p>Configure a rede WiFi do dispositivo</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">
        <span>Redes dispon&iacute;veis</span>
        <button class="rescan" onclick="scan()">&#x21BB; Atualizar</button>
      </div>
      <div id="list"><div class="msg"><span class="spinner"></span>Buscando redes...</div></div>
    </div>

    <div class="card">
      <div class="card-title">Credenciais</div>
      <form id="form" onsubmit="save(event)">
        <div class="form-group">
          <label>Nome da rede (SSID)</label>
          <input type="text" name="ssid" id="ssid"
                 placeholder="Selecione acima ou digite o nome"
                 required autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <div class="pass-wrap">
            <input type="password" name="pass" id="pass"
                   placeholder="Senha da rede WiFi"
                   autocomplete="new-password">
            <button type="button" class="eye" onclick="toggleEye()" title="Mostrar/ocultar">&#x1F441;</button>
          </div>
        </div>
        <button class="btn" id="btn">Salvar e Conectar</button>
        <div class="alert" id="alert"></div>
      </form>
    </div>
  </div>

  <footer>ESP32 LoRa Receiver &mdash; Modo de configura&ccedil;&atilde;o WiFi</footer>

<script>
var sel = null;

function bars(rssi) {
  var l = rssi > -55 ? 4 : rssi > -65 ? 3 : rssi > -75 ? 2 : 1, h = '';
  for (var i = 1; i <= 4; i++) h += '<b class="' + (i <= l ? 'on' : '') + '"></b>';
  return '<div class="signal">' + h + '</div>';
}

function scan() {
  var list = document.getElementById('list');
  list.innerHTML = '<div class="msg"><span class="spinner"></span>Buscando redes...</div>';

  fetch('/scan')
    .then(function (r) { return r.json(); })
    .then(function (nets) {
      list.innerHTML = '';
      if (!nets.length) {
        list.innerHTML = '<div class="msg">Nenhuma rede encontrada. ' +
          '<button class="rescan" onclick="scan()">Tentar novamente</button></div>';
        return;
      }
      nets.forEach(function (n) {
        var item = document.createElement('div');
        item.className = 'net-item';
        item.dataset.ssid = n.ssid;
        item.onclick = function () { pick(this); };

        var info = document.createElement('div');

        var nameEl = document.createElement('div');
        nameEl.className = 'net-name';
        if (n.enc) {
          var lock = document.createElement('span');
          lock.className = 'net-lock';
          lock.textContent = '🔒';
          nameEl.appendChild(lock);
        }
        nameEl.appendChild(document.createTextNode(n.ssid));

        var meta = document.createElement('div');
        meta.className = 'net-meta';
        meta.textContent = n.rssi + ' dBm';

        info.appendChild(nameEl);
        info.appendChild(meta);

        item.innerHTML = bars(n.rssi);   // signal bars on the right
        item.insertBefore(info, item.firstChild);
        list.appendChild(item);
      });
    })
    .catch(function () {
      list.innerHTML = '<div class="msg">Erro ao buscar redes. ' +
        '<button class="rescan" onclick="scan()">Tentar novamente</button></div>';
    });
}

function pick(el) {
  if (sel) sel.classList.remove('active');
  el.classList.add('active');
  sel = el;
  document.getElementById('ssid').value = el.dataset.ssid;
  document.getElementById('pass').focus();
}

function toggleEye() {
  var p = document.getElementById('pass');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function save(e) {
  e.preventDefault();
  var btn = document.getElementById('btn');
  var al  = document.getElementById('alert');
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  al.style.display = 'none';

  var fd = new FormData(document.getElementById('form'));
  fetch('/save', { method: 'POST', body: new URLSearchParams(fd) })
    .then(function (r) {
      if (!r.ok) throw new Error();
      al.className = 'alert ok';
      al.innerHTML = '<strong>Salvo!</strong> O dispositivo vai reiniciar e conectar &agrave; rede selecionada.';
      al.style.display = 'block';
      btn.textContent = '✔ Salvo!';
    })
    .catch(function () {
      al.className = 'alert err';
      al.textContent = 'Erro ao salvar. Verifique o SSID e tente novamente.';
      al.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Salvar e Conectar';
    });
}

scan();
</script>
</body>
</html>
